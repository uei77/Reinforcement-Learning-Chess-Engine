<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1900–2000 ELO Chess Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0f14;
            --surface:   #161b27;
            --surface2:  #1e2536;
            --border:    #2a3350;
            --accent:    #4f8ef7;
            --accent2:   #7c5cfc;
            --success:   #22c55e;
            --warning:   #f59e0b;
            --error:     #ef4444;
            --text:      #e2e8f0;
            --muted:     #8892a4;
            --radius:    12px;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,142,247,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(124,92,252,0.07) 0%, transparent 60%),
                var(--bg);
        }

        .container {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            width: 100%;
            max-width: 1040px;
        }

        .board-wrapper {
            flex: 0 0 auto;
        }

        #board {
            width: min(560px, calc(100vw - 320px - 80px));
            min-width: 280px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 0 0 2px var(--border), 0 24px 60px rgba(0,0,0,0.6);
        }

        #board .board-b72b1 { border-radius: var(--radius); }

        .info-panel {
            flex: 1 1 280px;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-panel h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .status-box {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid transparent;
            transition: all 0.25s;
            line-height: 1.4;
        }
        .status-box.success  { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.3);  color: var(--success); }
        .status-box.error    { background: rgba(239,68,68,0.12);   border-color: rgba(239,68,68,0.3);  color: var(--error); }
        .status-box.thinking { background: rgba(79,142,247,0.12);  border-color: rgba(79,142,247,0.3); color: var(--accent); }
        .status-box.thinking::after {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1s infinite;
            vertical-align: middle;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-row label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
        .slider-row span  { font-weight: 700; color: var(--accent); min-width: 34px; text-align: right; font-size: 0.9rem; }
        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(79,142,247,0.25);
            transition: box-shadow 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 6px rgba(79,142,247,0.25);
        }

        #history {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .move-chip {
            padding: 3px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: 'Inter', monospace;
            color: var(--text);
        }
        .move-chip.engine { border-color: rgba(79,142,247,0.5); color: var(--accent); }

        .results-row {
            display: flex;
            gap: 8px;
        }
        .result-stat {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .result-stat .val { font-size: 1.3rem; font-weight: 700; color: var(--text); }
        .result-stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

        .buttons { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            flex: 1;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .btn:hover:not(:disabled)  { background: var(--border); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-color: transparent;
            color: #fff;
        }
        .btn.primary:hover:not(:disabled) { filter: brightness(1.15); color: #fff; }

        @media (max-width: 700px) {
            .container { flex-direction: column; align-items: center; }
            #board { width: min(96vw, 440px) !important; }
            .info-panel { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>

        <div class="info-panel">
            <h1>1900 – 2000 ELO Chess Engine</h1>

            <div id="status" class="status-box success">White to move</div>

            <div class="card">
                <h3>Move History</h3>
                <div id="history"></div>
            </div>

            <div class="card" id="resultsPanel" style="display:none">
                <h3>Session Results</h3>
                <div class="results-row">
                    <div class="result-stat"><div class="val" id="statEngine">0</div><div class="lbl">Engine</div></div>
                    <div class="result-stat"><div class="val" id="statPlayer">0</div><div class="lbl">Player</div></div>
                    <div class="result-stat"><div class="val" id="statDraws">0</div><div class="lbl">Draws</div></div>
                    <div class="result-stat"><div class="val" id="statTotal">0</div><div class="lbl">Total</div></div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn" onclick="undoMove()" id="undoBtn" disabled>↩ Undo</button>
                <button class="btn primary" onclick="resetGame()">New Game</button>
                <button class="btn" onclick="showResults()">Results</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        const API_BASE_URL = '';              
        const API_KEY      = 'default_key_change_this'; 

        let board          = null;
        let game           = new Chess();
        const $status      = $('#status');
        const $history     = $('#history');
        let isEngineThinking = false;
        let currentGameId  = null;
        let moveCount      = 0;

        const NUM_SIMULATIONS = 800;

        function updateStatus() {
            $status.removeClass('success error thinking');
            if (game.in_checkmate()) {
                const winner = game.turn() === 'w' ? 'Black (Engine)' : 'White (You)';
                $status.addClass('error').text(`Checkmate — ${winner} wins!`);
            } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
                $status.addClass('thinking').text('Draw');
            } else if (game.in_check()) {
                const side = game.turn() === 'w' ? 'White' : 'Black';
                $status.addClass('error').text(`${side} is in check!`);
            } else {
                const side = game.turn() === 'w' ? '⬜ Your turn (White)' : '⬛ Engine thinking…';
                $status.addClass('success').text(side);
            }
        }

        function updateHistory(move, isEngine) {
            moveCount++;
            const chip = $('<span>').addClass('move-chip').text(`${moveCount}. ${move.san}`);
            if (isEngine) chip.addClass('engine');
            $history.append(chip);
            $history.scrollTop($history[0].scrollHeight);
            $('#undoBtn').prop('disabled', false);
        }

        function undoMove() {
            if (isEngineThinking) return;
            game.undo();
            game.undo();
            moveCount = Math.max(0, moveCount - 2);
            board.position(game.fen());
            $history.find('.move-chip').last().remove();
            $history.find('.move-chip').last().remove();
            if (game.history().length === 0) $('#undoBtn').prop('disabled', true);
            updateStatus();
        }

        function onDrop(source, target) {
            if (isEngineThinking) return 'snapback';

            const move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            updateHistory(move, false);
            updateStatus();

            if (!game.game_over()) {
                setTimeout(makeEngineMove, 120);
            }
        }

        function onSnapEnd() { board.position(game.fen()); }
        function onDragStart(source, piece) {
            if (isEngineThinking) return false;
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        async function createNewGame() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/v1/game/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                currentGameId = data.game_id;
                console.log('New game:', currentGameId);
            } catch (e) {
                console.error('createNewGame failed:', e);
                $status.removeClass('success thinking').addClass('error')
                       .html('⚠ Backend Offline &mdash; run <code>python main.py</code> then refresh.');
            }
        }

        async function makeEngineMove() {
            isEngineThinking = true;

            let elapsed = 0;
            const timer = setInterval(() => {
                elapsed++;
                $status.removeClass('success error').addClass('thinking')
                       .text(`Engine is thinking… (${elapsed}s)`);
            }, 1000);
            $status.removeClass('success error').addClass('thinking').text('Engine is thinking… (0s)');

            const controller = new AbortController();
            const timeoutId  = setTimeout(() => controller.abort(), 5 * 60 * 1000);

            try {
                const sims = NUM_SIMULATIONS;
                const res  = await fetch(`${API_BASE_URL}/api/v1/engine/move`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ fen: game.fen(), game_id: currentGameId, num_simulations: sims }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                clearInterval(timer);

                if (!res.ok) {
                    if (res.status === 401) throw new Error('Invalid API key');
                    throw new Error(`HTTP ${res.status}`);
                }

                const data = await res.json();
                if (data.game_over) {
                    $status.removeClass('thinking').addClass('error').text(`Game Over: ${data.result}`);
                    isEngineThinking = false;
                    return;
                }

                const uci  = data.best_move;
                if (!uci) throw new Error('Empty move');
                const move = game.move({ from: uci.slice(0,2), to: uci.slice(2,4), promotion: uci[4] || 'q' });
                if (move) updateHistory(move, true);
                board.position(game.fen());
                isEngineThinking = false;
                updateStatus();

            } catch (e) {
                clearTimeout(timeoutId);
                clearInterval(timer);
                console.error('Engine error:', e);
                isEngineThinking = false;
                game.undo();
                board.position(game.fen());
                const msg = e.name === 'AbortError' ? 'Engine timed out (>5 min)' : `Engine error: ${e.message}`;
                $status.removeClass('thinking success').addClass('error').text(msg);
            }
        }

        async function showResults() {
            try {
                const res  = await fetch(`${API_BASE_URL}/api/v1/game/results`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const d = await res.json();
                $('#statEngine').text(d.engine_wins);
                $('#statPlayer').text(d.player_wins);
                $('#statDraws').text(d.draws);
                $('#statTotal').text(d.total_games);
                $('#resultsPanel').show();
            } catch (e) {
                console.error('Results error:', e);
                $('#resultsPanel').show();
            }
        }

        async function resetGame() {
            if (isEngineThinking) return;
            game.reset();
            moveCount = 0;
            $history.empty();
            $('#undoBtn').prop('disabled', true);
            $('#resultsPanel').hide();
            board.start();
            updateStatus();
            await createNewGame();
        }

        board = Chessboard('board', {
            draggable:   true,
            position:    'start',
            pieceTheme:  'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop:      onDrop,
            onSnapEnd:   onSnapEnd
        });

        $(window).resize(board.resize);
        resetGame();
    </script>
</body>
</html>
